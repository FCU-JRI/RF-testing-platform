[workspace]
name = "P2026_rfTest"
version = "0.1.0"
description = "LoRa Avionic Link Test & Flashing Manager"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "win-64", "linux-64"]

[tasks]
# Python scripts
run   = "python rf_test_manager.py"
run-w = "python rf_test_manager_w.py"
gui   = "python rf_test_manager_gui.py"

# PlatformIO tasks
build   = "pio run"
upload  = "pio run --target upload"
monitor = "pio device monitor"
clean   = "pio run --target clean"
flash   = { depends-on = ["build", "upload"] }

[dependencies]
python     = ">=3.9"
pyserial   = ">=3.5"
platformio = ">=6.1.19,<7"
